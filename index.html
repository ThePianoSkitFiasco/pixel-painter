<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Sandbox</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>Pixel Sandbox</h1>
        <div class="controls">
          <button id="clear-button" type="button">Clear</button>
          <button id="fill-button" type="button">Fill Background</button>
          <button id="block-button" type="button">Draw Test Block</button>
          <button id="border-button" type="button">Draw Border</button>
        </div>
        <div class="prompt-controls">
          <input
            id="prompt-input"
            type="text"
            placeholder="Try: brick wall, stone, border, clear"
          />
          <button id="prompt-button" type="button">Run Prompt Step</button>
        </div>
        <div class="log-panel">
          <h2>Agent Log</h2>
          <div id="log-list"></div>
        </div>
        <div class="inspection-panel">
          <h2>Inspection</h2>
          <p>Filled Pixels: <span id="filled-pixels">0</span></p>
          <p>Bounds: <span id="bounds">None</span></p>
          <div class="color-counts">
            <h3>Color Counts</h3>
            <div id="color-counts"></div>
          </div>
        </div>
      </section>

      <section class="viewer">
        <canvas
          id="pixel-canvas"
          width="64"
          height="64"
          aria-label="Pixel canvas"
        ></canvas>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
